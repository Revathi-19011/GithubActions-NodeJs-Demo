name: Multiple runners and choose jobs
on: 
    workflow_dispatch:
        inputs:
            runner:
                description: 'Choose the runner to run the job'
                required: true
                default: 'ubuntu-latest'
                type: choice
                options:
                    - ubuntu-latest
                    - windows-latest
                    - macos-
            job-name:
                description: 'Enter multiple jobs names to execute (comma-separated)'
                required: true
                type: string
jobs:
    Build-job:
        if: contains( github.event.inputs.job-name, 'build-job' )
        runs-on: ${{ github.event.inputs.runner}}
        steps:
            - name: Build step
              run: echo "Running build job on ${{github.event.inputs.runner}}"

    Test-job:
        if: contains( github.event.inputs.job-name, 'testjob' )
        runs-on: ${{ github.event.inputs.runner}}
        steps:
            - name: Test step
              run: echo "Running test job on ${{github.event.inputs.runner}}"
            

    Deploy-job:
        if: contains( github.event.inputs.job-name, 'deploy-job' )
        runs-on: ${{ github.event.inputs.runner}}
        steps:
            - name: Deploy step
              run: echo "Running deploy job on ${{github.event.inputs.runner}}"
