name: Build nodejs application using github actions
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  buildnodejs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install nodejs of version 18 and npm
        uses: actions/setup-node@v6
        with: 
          node-version: 18
     
      - name: Install dependencies using npm
        run: npm install

      - name: Run tests using npm
        run: npm test

      - name: Build the application usig npm
        run: npm run build
