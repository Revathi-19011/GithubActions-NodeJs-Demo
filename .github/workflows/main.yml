name: Multiple runners and choose jobs
on: 
    workflow_dispatch:
        inputs:
            runner:
                description: 'Choose the runner to run the job'
                required: true
                default: 'ubuntu-latest'
                type: choice
                options:
                    - ubuntu-latest
                    - windows-latest
                    - macos-
            job-name:
                description: 'Choose the job to run'
                required: true
                default: 'build'
                type: choice
                options:
                    - build-job
                    - test-job
                    - deploy-job
jobs:
    Build-job:
        if: ${{ github.event.inputs['job-name'] == 'build-job' }}
        runs-on: ${{ github.event.inputs.runner}}
        steps:
            - name: Build step
              run: echo "Running build job on ${{github.event.inputs.runner}}"

    Test-job:
        if: ${{ github.event.inputs['job-name'] == 'test-job' }}
        runs-on: ${{ github.event.inputs.runner}}
        steps:
            - name: Test step
              run: echo "Running test job on ${{github.event.inputs.runner}}"
            

    Deploy-job:
        if: ${{ github.event.inputs['job-name'] == 'deploy-job' }}
        runs-on: ${{ github.event.inputs.runner}}
        steps:
            - name: Deploy step
              run: echo "Running deploy job on ${{github.event.inputs.runner}}"
